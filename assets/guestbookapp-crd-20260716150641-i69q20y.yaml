apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: guestbookapps.workshop.sws26.io
spec:
  group: workshop.sws26.io
  names:
    kind: GuestbookApp
    plural: guestbookapps
    singular: guestbookapp
    shortNames:
    - gba
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [title, replicas]
            properties:
              title:
                type: string
                description: Page heading shown in the guestbook UI
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                description: Number of frontend replicas
    additionalPrinterColumns:
    - name: Title
      type: string
      jsonPath: .spec.title
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
